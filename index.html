<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#384527" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Osnova" />
    <meta name="description" content="Osnova — кофейня и гастроном. Свежий кофе, выпечка и деликатесы." />
    <title>Osnova</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #FCF9F0;
        transition: opacity 0.5s ease;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash .splash-icon {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        animation: splash-breathe 2s ease-in-out infinite;
      }
      #splash .splash-sub {
        margin-top: 16px;
        font-family: 'Manrope Variable', system-ui, sans-serif;
        font-size: 13px;
        color: #6b6960;
        letter-spacing: 0.04em;
      }
      @keyframes splash-breathe {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.06); opacity: 0.85; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/pwa-192x192.png" alt="Osnova" class="splash-icon" />
      <span class="splash-sub">гастроном и кофе</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
